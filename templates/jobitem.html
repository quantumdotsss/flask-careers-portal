<article class="role-card" id="job-{{ job.id }}">
  <div class="role-topline">
    <span class="department">{{ job.department }}</span>
    <span class="role-id">#{{ "%02d"|format(job.id) }}</span>
  </div>
  <h3>{{ job.title }}</h3>
  <p class="role-summary">{{ job.summary }}</p>
  <div class="role-meta">
    <span>{{ job.location }}</span>
    <span>{{ job.employment_type }}</span>
    <span>{{ job.salary }}</span>
  </div>
  <ul class="skill-list" aria-label="Skills">
    {% for skill in job.skills %}<li>{{ skill }}</li>{% endfor %}
  </ul>
  <a class="role-link" href="{{ url_for('job_detail', job_id=job.id) }}">
    View API record <span aria-hidden="true">→</span>
  </a>
</article>
